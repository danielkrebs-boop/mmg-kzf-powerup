<!DOCTYPE html>
<html>
<head>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 12px; margin: 0; background: #fff; }
    textarea { width: 100%; height: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; resize: none; box-sizing: border-box; }
    button { margin-top: 8px; width: 100%; padding: 8px; background: #0079BF; color: white; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
    button:hover { background: #005f9e; }
    .label { font-size: 13px; color: #444; margin-bottom: 8px; }
    .error { color: red; font-size: 12px; margin-top: 4px; display: none; }
  </style>
</head>
<body>
  <div class="label" id="status-label"></div>
  <textarea id="notiz" placeholder=""></textarea>
  <div class="error" id="error">Bitte eine Notiz eingeben.</div>
  <button onclick="speichern()">Speichern</button>

<script>
  var params = new URLSearchParams(window.location.search);
  var score = parseInt(params.get('score'));
  var label = decodeURIComponent(params.get('label') || '');

  document.getElementById('status-label').innerHTML = 'Status: <strong>' + label + '</strong>';
  document.getElementById('notiz').placeholder = score <= 2
    ? 'Positives Kundenfeedback oder Lob...'
    : 'Grund + geplante Maßnahmen...';

function speichern() {
    var notiz = document.getElementById('notiz').value.trim();
    if (!notiz) {
      document.getElementById('error').style.display = 'block';
      return;
    }
    var scoreNum = parseInt(score);
    var emoji = scoreNum <= 2 ? '✅' : scoreNum === 3 ? '➖' : '⚠️';
    var kommentar = emoji + ' Kundenzufriedenheit aktualisiert\n'
      + 'Status: ' + label + '\n'
      + 'Notiz: ' + notiz;
    
var cardId = params.get('cardId');
var labelMap = {
  1: '6a0f38aedf026515e93b79b7',
  2: '6a0f38e53aaefb96b65c0361',
  3: '6a0f3923e86c1ae238909191',
  4: '6a0f3940c3d2a46602c46e4d',
  5: '6a0f395c07b25c6514de0603'
};
var kzfLabelIds = Object.values(labelMap);
var zielLabelId = labelMap[scoreNum];
var baseUrl = 'https://api.trello.com/1/cards/' + cardId;
var auth = 'key=d88c51162642265f49f923163f6336be&token=ATTA5c652fd6d080dc0d3abf82e3275c24e1f5d203a64abfd7a290132d94d5fc5c4320F128B7';

// Schritt 1: Alle KZF-Labels entfernen
var removePromises = kzfLabelIds.map(function(labelId) {
  return fetch(baseUrl + '/idLabels/' + labelId + '?' + auth, { method: 'DELETE' });
});

Promise.all(removePromises)
  .then(function() {
    // Schritt 2: Neues KZF-Label setzen
    return fetch(baseUrl + '/idLabels?' + auth, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'value=' + zielLabelId
    });
  })
  .then(function() {
    // Schritt 3: Kommentar posten
    return fetch(baseUrl + '/actions/comments?' + auth + '&text=' + encodeURIComponent(kommentar), {
      method: 'POST'
    });
  })
  .then(function(response) {
    if (response.ok) {
      window.location.href = 'about:blank';
    } else {
      alert('Fehler: Status ' + response.status);
    }
  })
  .catch(function(err) {
    alert('Fehler: ' + err.message);
  });
  }
</script>
</body>
</html>
